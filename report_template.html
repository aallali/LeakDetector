<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Memory Analysis Report</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Courier New',monospace;background:#fff;color:#000;line-height:1.6;padding:20px;max-width:900px;margin:0 auto;}header{border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px;}h1{font-size:20px;font-weight:bold;margin-bottom:5px;}.meta{font-size:11px;color:#666;}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:30px;border:1px solid #ddd;padding:15px;}.summary-item .count{font-size:16px;font-weight:bold;margin-bottom:3px;}.summary-item.critical .count{color:#dc3545;}.summary-item.warning .count{color:#ffc107;}.summary-item.info .count{color:#17a2b8;}.summary-item .label{font-size:11px;text-transform:uppercase;color:#666;letter-spacing:1px;}.controls{margin-bottom:20px;padding:10px;border:1px solid #ddd;background:#f9f9f9;}.filter-btn{padding:5px 10px;margin-right:8px;border:1px solid #999;background:#fff;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;}.filter-btn:hover{background:#f0f0f0;}.filter-btn.active{background:#000;color:#fff;border-color:#000;}.issue{margin-bottom:25px;padding:15px;border:1px solid #ddd;border-left:4px solid #999;}.issue.critical{border-left-color:#dc3545;background:#fff5f5;}.issue.warning{border-left-color:#ffc107;background:#fffbf0;}.issue.info{border-left-color:#17a2b8;background:#f0f8fb;}.issue-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}.issue-title{font-size:13px;font-weight:bold;flex:1;}.severity-badge{padding:3px 8px;font-size:10px;text-transform:uppercase;border:1px solid #999;background:#fff;margin-left:10px;white-space:nowrap;}.severity-badge.critical{border-color:#dc3545;background:#ffebee;color:#c62828;}.severity-badge.warning{border-color:#ffc107;background:#fff8e1;color:#f57c00;}.severity-badge.info{border-color:#17a2b8;background:#e0f7fa;color:#00838f;}.issue-location{font-size:11px;color:#666;margin-bottom:10px;padding:8px;background:#f9f9f9;border-left:2px solid #999;}.issue-description{font-size:12px;margin-bottom:12px;line-height:1.5;}.code-snippet{background:#f9f9f9;border:1px solid #ddd;padding:10px;margin-bottom:12px;font-size:11px;overflow-x:auto;line-height:1.4;}.issue-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;font-size:11px;}.detail{padding:8px;border:1px solid #ddd;background:#f9f9f9;}.detail-label{font-weight:bold;margin-bottom:3px;text-transform:uppercase;font-size:10px;color:#666;}.fix-section{background:#f9f9f9;border:1px solid #ddd;padding:10px;margin-top:12px;}.fix-title{font-weight:bold;margin-bottom:8px;font-size:11px;text-transform:uppercase;}pre{background:#f9f9f9;border:1px solid #ddd;padding:10px;overflow-x:auto;margin:8px 0;}code{font-family:'Courier New',monospace;font-size:11px;}pre code{background:none;padding:0;}.hljs{background:#f9f9f9 !important;}footer{border-top:1px solid #ddd;padding-top:15px;margin-top:30px;font-size:10px;color:#999;text-align:center;}</style></head><body><header><h1>Memory Analysis Report</h1><div class="meta">Generated: {timestamp} | LangChain + Deepseek Analysis</div></header><div class="summary"><div class="summary-item critical"><div class="count">{critical_count}</div><div class="label">Critical</div></div><div class="summary-item warning"><div class="count">{warning_count}</div><div class="label">Warnings</div></div><div class="summary-item info"><div class="count">{info_count}</div><div class="label">Info</div></div></div><div class="controls"><button class="filter-btn active" onclick="filterIssues('all')">All</button><button class="filter-btn" onclick="filterIssues('critical')">Critical</button><button class="filter-btn" onclick="filterIssues('warning')">Warning</button><button class="filter-btn" onclick="filterIssues('info')">Info</button></div><div class="issues"> {issues_html} </div><footer> Memory Profiler | LangChain + Deepseek </footer><script> function filterIssues(severity) { const issues = document.querySelectorAll('.issue'); const buttons = document.querySelectorAll('.filter-btn'); buttons.forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); issues.forEach(issue => { issue.style.display = severity === 'all' || issue.dataset.severity === severity ? 'block' : 'none'; }); } // Highlight code blocks on page load document.addEventListener('DOMContentLoaded', () => { document.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); }); }); </script></body></html>
